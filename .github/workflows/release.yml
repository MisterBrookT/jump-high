name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.5.0)'
        required: true
        default: 'v0.5.0'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          BODY=$(awk "/^## \\[${TAG}\\]/,/^## \\[v/" CHANGELOG.md \
            | grep -v "^## \\[v" | sed '/^$/d' | head -40)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/interesting-vibe-coding/paws-games/blob/main/CHANGELOG.md) for details."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false

      - name: Compute source archive SHA256
        run: |
          sleep 10
          TAG="${{ github.event.inputs.tag_name }}"
          ARCHIVE_URL="https://github.com/interesting-vibe-coding/paws-games/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$ARCHIVE_URL" | sha256sum | cut -d' ' -f1)
          echo "=== HOMEBREW SHA256 ==="
          echo "url: $ARCHIVE_URL"
          echo "sha256: $SHA256"
          echo "=== END HOMEBREW SHA256 ==="
